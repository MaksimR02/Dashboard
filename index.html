<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="src/styles/main.css" />
</head>

<body>
    <div id="app" class="app">
        <button id="open-button" class="open-button hidden">→</button>
        <div class="side-panel">
            <button id="toggle-button" class="toggle-button">☰</button>
            <div class="month-selector">
                <h3>Period</h3>
                <select name="month-select" class="month-select" id="month-select">
                    <option value="0">January</option>
                    <option value="1">February</option>
                    <option value="2">March</option>
                    <option value="3" selected>April</option>
                    <option value="4">May</option>
                    <option value="5">June</option>
                    <option value="6">July</option>
                    <option value="7">August</option>
                    <option value="8">September</option>
                    <option value="9">October</option>
                    <option value="10">November</option>
                    <option value="11">December</option>
                </select>

                <select name="year-select" class="year-select" id="year-select">
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                </select>
            </div>
            <div class="nav">
                <a href="#" id="nav-project" class="nav-item active">Project</a>
                <a href="#" id="nav-project-employees" class="nav-item">Employees</a>
            </div>
        </div>

        <div class="main-content">
            <div id="project-content" class="project-content">
                <div class="content-header">
                    <h1>Projects</h1>
                    <div class="">
                        <button id="add-project-btn" class="add-btn">+Add Project</button>
                        
                        <div id="project-modal" class="modal hidden">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h2>Add Project</h2>
                                    <button type="button" id="close-project-modal-btn" class="modal-close-btn">
                                        ×
                                    </button>
                                </div>

                                <form id="project-form" class="modal-form">
                                    <label class="form-field">
                                        <span>Company Name</span>
                                        <input type="text" id="project-company-name" name="companyName" required />
                                    </label>

                                    <label class="form-field">
                                        <span>Project Name</span>
                                        <input type="text" id="project-name" name="projectName" required />
                                    </label>

                                    <label class="form-field">
                                        <span>Budget</span>
                                        <input type="number" id="project-budget" name="budget" min="0" required />
                                    </label>

                                    <label class="form-field">
                                        <span>Employee Capacity</span>
                                        <input type="number" id="project-employee-capacity" name="employeeCapacity"
                                            min="1" required />
                                    </label>

                                    <div class="modal-actions">
                                        <button type="button" id="cancel-project-modal-btn" class="secondary-btn">
                                            Cancel
                                        </button>

                                        <button type="submit" class="primary-btn">
                                            Save Project
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <button id="seed-data-btn" class="add-btn">Seed Data</button>
                    </div>
                </div>


                <table id="projects-table" class="projects-table">
                    <thead>
                        <tr>
                            <th class="sortable filterable" data-sort="companyName" data-filter="companyName">
                                Company Name
                                <span class="sort-icon">⇅</span>
                                <span class="filter-icon" title="Filter">⌀</span>
                            </th>

                            <th class="sortable filterable" data-sort="projectName" data-filter="projectName">
                                Project Name
                                <span class="sort-icon">⇅</span>
                                <span class="filter-icon" title="Filter">⌀</span>
                            </th>

                            <th class="sortable" data-sort="budget">
                                Budget
                                <span class="sort-icon">⇅</span>
                            </th>

                            <th class="sortable" data-sort="employeeCapacity">
                                Employee Capacity
                                <span class="sort-icon">⇅</span>
                            </th>

                            <th>
                                Employees
                            </th>

                            <th class="sortable" data-sort="estimatedIncome">
                                Estimated Income
                                <span class="sort-icon">⇅</span>
                            </th>

                            <th>
                                Actions
                            </th>
                        </tr>
                    </thead>

                    <tbody></tbody>
                </table>

                <div id="projects-total-income" class="total-income-info">
                    <strong>Total Estimated Income:</strong>
                    <span class="total-amount positive-income">$0.00</span>
                </div>
            </div>

            <div id="employees-content" class="employees-content hidden">
                <div class="content-header">
                    <h1>Employees</h1>

                    <button id="add-employee-btn" class="add-btn">
                        +Add Employee
                    </button>
                </div>

                <div id="employee-filters-container" class="filters-container"></div>

                <table id="employees-table" class="employees-table">
                    <thead>
                        <tr>
                            <th class="sortable filterable" data-sort="name" data-filter="name">
                                Name
                                <span class="sort-icon">⇅</span>
                                <span class="filter-icon" title="Filter">⌀</span>
                            </th>

                            <th class="sortable filterable" data-sort="surname" data-filter="surname">
                                Surname
                                <span class="sort-icon">⇅</span>
                                <span class="filter-icon" title="Filter">⌀</span>
                            </th>

                            <th class="sortable" data-sort="age">
                                Age
                                <span class="sort-icon">⇅</span>
                            </th>

                            <th class="sortable filterable" data-sort="position" data-filter="position">
                                Position
                                <span class="sort-icon">⇅</span>
                                <span class="filter-icon" title="Filter">⌀</span>
                            </th>

                            <th class="sortable" data-sort="salary">
                                Salary
                                <span class="sort-icon">⇅</span>
                            </th>

                            <th class="sortable" data-sort="estimatedPayment">
                                Estimated Payment
                                <span class="sort-icon">⇅</span>
                            </th>

                            <th class="sortable filterable" data-sort="project" data-filter="project">
                                Project
                                <span class="sort-icon">⇅</span>
                                <span class="filter-icon" title="Filter">⌀</span>
                            </th>

                            <th class="sortable" data-sort="projectedIncome">
                                Projected Income
                                <span class="sort-icon">⇅</span>
                            </th>

                            <th>
                                Actions
                            </th>
                        </tr>
                    </thead>

                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="src/js/main.js"></script>
</body>

</html>
